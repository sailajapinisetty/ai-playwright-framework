<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Test Intelligence Report</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="shell">
      <aside class="sidebar">
        <div>
          <p class="eyebrow">AI Playwright Framework</p>
          <h1>Test Intelligence</h1>
          <p class="sidebar-copy">Automation results, failures, and coverage insights.</p>
        </div>
        <div class="sidebar-stats" id="global-stats"></div>
        <div class="sidebar-footer">Data source: generated test artifacts</div>
      </aside>
      <main class="main">
        <section class="hero">
          <div>
            <p class="eyebrow">Report UI</p>
            <h2>Automation execution summary</h2>
            <p id="generated-at">Loading current report data...</p>
          </div>
          <div class="actions">
            <button id="open-playwright-report-btn" class="secondary-btn" type="button">Show Playwright Report</button>
            <button id="back-main-btn" class="secondary-btn" type="button">Back To Main</button>
          </div>
        </section>
        <section class="detail-panel" id="detail-panel">
          <div class="empty-state">
            <h3>Loading report</h3>
            <p>Please wait while latest execution details are loaded.</p>
          </div>
        </section>
      </main>
    </div>
    <script>
      window.__API_BASE_URL = window.__API_BASE_URL || '';
    </script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
